name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions: write-all

jobs:
  check-release:
    name: Check Release Status
    runs-on: ubuntu-latest
    outputs:
      has_changesets: ${{ steps.check.outputs.has_changesets }}
    steps:
      - uses: actions/checkout@v4
      - name: Check for unreleased changesets
        id: check
        run: |
          # 1. Count total markdown files (excluding README)
          total_md=$(find .changeset -maxdepth 1 -name "*.md" ! -name "README.md" 2>/dev/null | wc -l || echo 0)
          
          # 2. Count how many are already logged in pre.json
          if [ -f .changeset/pre.json ]; then
            consumed=$(jq '.changesets | length' .changeset/pre.json)
          else
            consumed=0
          fi
          
          # 3. Calculate unreleased
          unreleased=$((total_md - consumed))
          echo "Total MD: $total_md, Consumed: $consumed, Unreleased: $unreleased"
          
          if [ "$unreleased" -gt 0 ]; then
            echo "has_changesets=true" >> $GITHUB_OUTPUT
          else
            echo "has_changesets=false" >> $GITHUB_OUTPUT
          fi

  version-pr:
    name: Create Version PR
    needs: check-release
    if: needs.check-release.outputs.has_changesets == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - run: bun install --frozen-lockfile
      
      - name: Create Release Pull Request
        uses: changesets/action@v1
        with:
          version: bun run ci:version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-binaries:
    name: Build ${{ matrix.pkg }}
    needs: check-release
    if: needs.check-release.outputs.has_changesets == 'false'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            pkg: ocel-linux-x64
            bin: ocel
          - os: macos-latest
            target: x86_64-apple-darwin
            pkg: ocel-darwin-x64
            bin: ocel
          - os: macos-latest
            target: aarch64-apple-darwin
            pkg: ocel-darwin-arm64
            bin: ocel
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            pkg: ocel-win32-x64
            bin: ocel.exe

    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust Target
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "alpha-release-${{ matrix.target }}"

      - name: Build Binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.pkg }}
          path: target/${{ matrix.target }}/release/${{ matrix.bin }}
          retention-days: 1

  publish:
    name: Publish to npm
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          
      - run: |
          npm config set //registry.npmjs.org/:_authToken $NODE_AUTH_TOKEN
          npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build Main JS Package
        run: bun run build

      - name: Download Binary Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Inject Binaries into Workspace Stubs
        run: |
          # Linux x64
          mkdir -p packages/native-lib/ocel-linux-x64/bin
          cp artifacts/bin-ocel-linux-x64/ocel packages/native-lib/ocel-linux-x64/bin/
          chmod +x packages/native-lib/ocel-linux-x64/bin/ocel

          # Darwin x64
          mkdir -p packages/native-lib/ocel-darwin-x64/bin
          cp artifacts/bin-ocel-darwin-x64/ocel packages/native-lib/ocel-darwin-x64/bin/
          chmod +x packages/native-lib/ocel-darwin-x64/bin/ocel

          # Darwin arm64
          mkdir -p packages/native-lib/ocel-darwin-arm64/bin
          cp artifacts/bin-ocel-darwin-arm64/ocel packages/native-lib/ocel-darwin-arm64/bin/
          chmod +x packages/native-lib/ocel-darwin-arm64/bin/ocel

          # Windows x64
          mkdir -p packages/native-lib/ocel-win32-x64/bin
          cp artifacts/bin-ocel-win32-x64/ocel.exe packages/native-lib/ocel-win32-x64/bin/

      - name: Sync Lockfile for Publishing
        run: bun update

      - name: Publish All Packages via Bun
        run: |
          # Loop through the main package AND the native-lib directory explicitly
          for dir in packages/ocel packages/native-lib/*; do
            if [ -d "$dir" ] && [ -f "$dir/package.json" ]; then
              echo "Publishing $dir..."
              (cd "$dir" && bun publish --access public) || true
            fi
          done
          
          bunx changeset tag
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}